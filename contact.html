<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-6100551786781834">
    <title>Contact Us - Product Builder Hub</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6100551786781834"
        crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap');

        body {
            /* 중복 스타일 생략, terms.html과 동일한 스타일 적용 */
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .header {
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: #f8fafc;
            text-decoration: none;
            background: linear-gradient(135deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #f8fafc;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-box {
            background: rgba(30, 41, 59, 0.4);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            line-height: 1.8;
            font-size: 0.95rem;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        footer {
            width: 100%;
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 4rem;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: inherit;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .footer-links a:hover {
            opacity: 1;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            font-family: inherit;
            font-size: 1rem;
            color: #f8fafc;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #60a5fa, #a855f7);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.4);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        #status-message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            text-align: center;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>

<body>
    <header class="header">
        <nav class="nav">
            <a href="/index.html" class="logo">Product Builder Hub</a>
            <div class="nav-links">
                <a href="/index.html">Home</a>
                <a href="/blog/index.html">Blog</a>
                <a href="/about.html">About</a>
                <a href="/contact.html" style="color: #f8fafc; font-weight: 700;">Contact</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>Contact Us</h1>
        <p style="text-align: center; opacity: 0.8; margin-bottom: 2rem;">비즈니스 제휴, 입점 문의 또는 도구 사용 시 불편했던 점을 남겨주시면 성심성의껏
            답변드리겠습니다.</p>

        <div class="content-box">
            <div id="status-message"></div>

            <form id="contactForm" action="https://formspree.io/f/mojnowrk" method="POST">
                <div class="form-group">
                    <label for="name">이름 (Name) / 회사명</label>
                    <input type="text" id="name" name="name" class="form-control" required
                        placeholder="예: (주)프로덕트빌더 길동홍">
                </div>
                <div class="form-group">
                    <label for="email">회신받을 이메일 주소 (Email)</label>
                    <input type="email" id="email" name="email" class="form-control" required
                        placeholder="예: contact@domain.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용 (Message)</label>
                    <textarea id="message" name="message" class="form-control" required
                        placeholder="자유롭게 문의하실 내용을 작성해 주세요. 통상적으로 24시간 내에 답변을 드립니다."></textarea>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">문의 보내기 (Send Message)</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="/terms.html">이용약관</a>
            <a href="/privacy.html">개인정보처리방침</a>
            <a href="/about.html">About Us</a>
            <a href="/contact.html">Contact Us</a>
        </div>
        <div style="opacity: 0.6; text-align: center; font-size: 0.85rem;">
            © <span id="year"></span> Product Builder. All rights reserved.
        </div>
    </footer>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        var form = document.getElementById("contactForm");
        var statusMessage = document.getElementById("status-message");
        var submitBtn = document.getElementById("submitBtn");

        async function handleSubmit(event) {
            event.preventDefault();
            var data = new FormData(event.target);
            submitBtn.disabled = true;
            submitBtn.textContent = '전송 중... (Sending...)';

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    statusMessage.innerHTML = "문의가 성공적으로 전송되었습니다. 검토 후 빠른 시일 내에 이메일로 회신드리겠습니다.";
                    statusMessage.className = "status-success";
                    statusMessage.style.display = "block";
                    form.reset();
                    form.style.display = "none";
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            statusMessage.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            statusMessage.innerHTML = "오류가 발생했습니다. 양식을 처리하는 중 문제가 발생했습니다.";
                        }
                        statusMessage.className = "status-error";
                        statusMessage.style.display = "block";
                    })
                }
            }).catch(error => {
                statusMessage.innerHTML = "네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
                statusMessage.className = "status-error";
                statusMessage.style.display = "block";
            }).finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = '문의 보내기 (Send Message)';
            });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
</body>

</html>
