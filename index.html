<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Builder Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .project-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(168, 85, 247, 0.5);
        }

        .project-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .project-desc {
            color: #cbd5e1;
            font-size: 1rem;
            line-height: 1.5;
        }

        .badge {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Product Builder Hub</h1>

        <a href="/lotto-generator/dist/index.html" class="project-card">
            <div class="project-title">
                Lotto Dreamer <span class="badge">V2 UPGRADE!</span>
            </div>
            <p class="project-desc">행운의 여신과 함께하는 프리미엄 로또 번호 생성기. 한 번의 클릭으로 5게임의 행운을 만나보세요.</p>
            <a href="/contact-form/dist/index.html" class="project-card" style="margin-top: 20px;">
                <div class="project-title">
                    제휴 및 파트너십 문의 <span class="badge"
                        style="background: linear-gradient(135deg, #3b82f6, #8b5cf6);">NEW</span>
                </div>
                <p class="project-desc">Product Builder 팀과의 비즈니스 제휴, 입점 및 다양한 협업 제안을 기다립니다.</p>
            </a>
    </div>
</body>

</html>
